enum CatalogoTipo {
  CLIENTE
  RUTA
  SUBRUTA
  RESPONSABLE
  ESTADO
  VEHICULO
}

type Viaje
  @model
  @auth(rules: [{ allow: private }]) {
  id: ID!
  fecha: AWSDate! @index(name: "viajesPorFecha", queryField: "viajesPorFecha", sortKeyFields: ["estado"])
  dia: String
  clienteEmpresa: String!
  rutaDestino: String!
  subrutaPuntoLocal: String
  responsableAsignado: String
  estado: String! @index(name: "viajesPorEstado", queryField: "viajesPorEstado", sortKeyFields: ["fecha"])
  observaciones: String
  valorMonto: Float
  numeroPedidos: Int
  placaVehiculo: String
}

type CatalogoItem
  @model
  @auth(rules: [{ allow: private }]) {
  id: ID!
  tipo: CatalogoTipo! @index(name: "catalogosPorTipo", queryField: "catalogosPorTipo", sortKeyFields: ["nombre"])
  nombre: String!
  activo: Boolean
  descripcion: String
}
